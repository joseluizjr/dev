<?xml version="1.0" encoding="UTF-8"?>
<svg width="500" height="250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for the hearts -->
    <linearGradient id="heartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ee5a52;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradient for the text -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34495e;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="250" fill="#f8f9fa" stroke="#e9ecef" stroke-width="3" rx="15"/>
  
  <!-- José Luiz with heart replacing 'e' -->
  <g transform="translate(50, 80)">
    <!-- J -->
    <text x="0" y="0" font-family="serif" font-size="36" font-weight="bold" fill="url(#textGradient)" filter="url(#shadow)">J</text>
    <!-- o -->
    <text x="25" y="0" font-family="serif" font-size="36" font-weight="bold" fill="url(#textGradient)" filter="url(#shadow)">o</text>
    <!-- s -->
    <text x="50" y="0" font-family="serif" font-size="36" font-weight="bold" fill="url(#textGradient)" filter="url(#shadow)">s</text>
    <!-- ́ (accent) -->
    <text x="70" y="-8" font-family="serif" font-size="16" font-weight="bold" fill="url(#textGradient)">́</text>
    <!-- Heart replacing 'e' -->
    <path d="M85 -8 C80 -13, 73 -13, 73 -6 C73 1, 85 9, 85 9 C85 9, 97 1, 97 -6 C97 -13, 90 -13, 85 -8 Z" 
          fill="url(#heartGradient)" stroke="#c0392b" stroke-width="1" filter="url(#shadow)"/>
    
    <!-- Space -->
    <!-- L -->
    <text x="120" y="0" font-family="serif" font-size="36" font-weight="bold" fill="url(#textGradient)" filter="url(#shadow)">L</text>
    <!-- u -->
    <text x="145" y="0" font-family="serif" font-size="36" font-weight="bold" fill="url(#textGradient)" filter="url(#shadow)">u</text>
    <!-- i -->
    <text x="170" y="0" font-family="serif" font-size="36" font-weight="bold" fill="url(#textGradient)" filter="url(#shadow)">i</text>
    <!-- z -->
    <text x="185" y="0" font-family="serif" font-size="36" font-weight="bold" fill="url(#textGradient)" filter="url(#shadow)">z</text>
  </g>
  
  <!-- "&" symbol -->
  <text x="250" y="130" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#95a5a6" filter="url(#shadow)">&amp;</text>
  
  <!-- Carla with heart replacing 'e' -->
  <g transform="translate(150, 180)">
    <!-- C -->
    <text x="0" y="0" font-family="serif" font-size="36" font-weight="bold" fill="url(#textGradient)" filter="url(#shadow)">C</text>
    <!-- a -->
    <text x="30" y="0" font-family="serif" font-size="36" font-weight="bold" fill="url(#textGradient)" filter="url(#shadow)">a</text>
    <!-- r -->
    <text x="55" y="0" font-family="serif" font-size="36" font-weight="bold" fill="url(#textGradient)" filter="url(#shadow)">r</text>
    <!-- l -->
    <text x="75" y="0" font-family="serif" font-size="36" font-weight="bold" fill="url(#textGradient)" filter="url(#shadow)">l</text>
    <!-- a -->
    <text x="90" y="0" font-family="serif" font-size="36" font-weight="bold" fill="url(#textGradient)" filter="url(#shadow)">a</text>
  </g>
  
  <!-- Decorative hearts -->
  <path d="M30 30 C25 25, 18 25, 18 32 C18 39, 30 47, 30 47 C30 47, 42 39, 42 32 C42 25, 35 25, 30 30 Z" 
        fill="#ff9999" opacity="0.6"/>
  
  <path d="M470 30 C465 25, 458 25, 458 32 C458 39, 470 47, 470 47 C470 47, 482 39, 482 32 C482 25, 475 25, 470 30 Z" 
        fill="#ff9999" opacity="0.6"/>
  
  <path d="M30 220 C25 215, 18 215, 18 222 C18 229, 30 237, 30 237 C30 237, 42 229, 42 222 C42 215, 35 215, 30 220 Z" 
        fill="#ff9999" opacity="0.6"/>
  
  <path d="M470 220 C465 215, 458 215, 458 222 C458 229, 470 237, 470 237 C470 237, 482 229, 482 222 C482 215, 475 215, 470 220 Z" 
        fill="#ff9999" opacity="0.6"/>
  
  <!-- Small stars -->
  <polygon points="100,200 102,206 108,206 103,210 105,216 100,212 95,216 97,210 92,206 98,206" fill="#ffd700" opacity="0.7"/>
  <polygon points="400,50 402,56 408,56 403,60 405,66 400,62 395,66 397,60 392,56 398,56" fill="#ffd700" opacity="0.7"/>
</svg>